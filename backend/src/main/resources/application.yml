spring:
  application:
    name: planner-casamento-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/planner_casamento}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8081

storage:
  upload-dir: uploads
  base-url: http://localhost:8081/uploads

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

cors:
  allowed-origins: http://localhost:8080,http://localhost:5173,http://localhost:3000